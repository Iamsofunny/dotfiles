# PLACEHOLDER — replace with your real fuzzel config.
# Committed / read-only (set-and-forget): changes need a nixos-rebuild switch.
# Bound to Mod+D in niri/.config/niri/config.kdl.

[main]
terminal=kitty
font=JetBrainsMono Nerd Font:size=12
prompt=" ❯ "
icon-theme=Adwaita
lines=12
width=42
horizontal-pad=16
vertical-pad=10
inner-pad=6

[colors]
# Matches the Waybar palette (colors.css).
background=0f1117f2
text=9aaec8ff
match=4a9effff
selection=1a6fd4ff
selection-text=ffffffff
selection-match=ffffffff
border=1a2030ff

[border]
width=1
radius=8
