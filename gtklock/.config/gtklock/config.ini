# gtklock — see gtklock(1). Committed / read-only (set-and-forget):
# changes need a nixos-rebuild switch.
# Note: --daemonize (fork after the session is locked) is passed at the
# call sites (swayidle config, niri bind), not set here.
# style.css next to this file is picked up automatically.

[main]
time-format=%H:%M
date-format=%A, %B %d
